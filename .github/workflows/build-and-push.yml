name: Build and push Docker images

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history so git rev-list --count works

      - name: Resolve build metadata
        id: meta
        run: |
          echo "build_version=v$(jq -r .version package.json)"         >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"        >> "$GITHUB_OUTPUT"
          echo "git_sha=$(git rev-parse --short=7 HEAD)"               >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%H:%M:%S) UTC"                   >> "$GITHUB_OUTPUT"
          echo "build_number=$(git rev-list --count HEAD)"             >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image prefix
        id: img
        run: |
          PREFIX="${{ env.REGISTRY }}/${{ github.repository_owner }}/applauncher"
          echo "backend=${PREFIX}-backend"   >> "$GITHUB_OUTPUT"
          echo "frontend=${PREFIX}-frontend" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ steps.img.outputs.backend }}:latest
            ${{ steps.img.outputs.backend }}:${{ steps.meta.outputs.git_sha }}
          build-args: |
            BUILD_VERSION=${{ steps.meta.outputs.build_version }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            GIT_SHA=${{ steps.meta.outputs.git_sha }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
            BUILD_NUMBER=${{ steps.meta.outputs.build_number }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ steps.img.outputs.frontend }}:latest
            ${{ steps.img.outputs.frontend }}:${{ steps.meta.outputs.git_sha }}
          build-args: |
            BUILD_VERSION=${{ steps.meta.outputs.build_version }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            GIT_SHA=${{ steps.meta.outputs.git_sha }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
            BUILD_NUMBER=${{ steps.meta.outputs.build_number }}
