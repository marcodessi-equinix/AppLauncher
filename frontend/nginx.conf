server {
    listen 80 default_server;
    server_name _;
    server_tokens off;
    client_max_body_size 50m;

    # Prevent nginx from generating absolute redirects with wrong scheme/port.
    # Without this, try_files directory checks can emit 301 redirects like
    # http://_/path/ or http://host:80/path/ — both break behind HTTPS proxies.
    absolute_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS — re-resolve on every request so container IP
    # changes (restart/recreate) don't produce stale 502/504 errors.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend http://backend:3000;

    # Compress responses — critical for double-proxy chains (NPM → nginx → backend).
    # Without gzip_proxied, nginx skips compression for proxied responses.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Preserve X-Forwarded-Proto from upstream proxy for correct HTTPS detection.
    set $forwarded_proto $scheme;
    if ($http_x_forwarded_proto) {
        set $forwarded_proto $http_x_forwarded_proto;
    }

    # Vite hashed assets — immutable long-cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # SPA: serve static files, fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;

        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.open-meteo.com https://api.iconify.design https://api.mymemory.translated.net; frame-ancestors 'none';" always;
    }

    # Reverse-proxy API to backend
    location /api/ {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Reverse-proxy uploaded assets to backend
    location /uploads/ {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Connection "";
    }
}
