server {
    listen 80;
    server_tokens off;
    client_max_body_size 50m;

    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS — re-resolve backend IP on container restart.
    # Without this, nginx caches the IP at startup and breaks if
    # the backend container is recreated (new IP → stale entry → 504).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Preserve X-Forwarded-Proto from an upstream reverse proxy (NPM, Traefik, etc.)
    # so the backend can detect HTTPS correctly for secure cookies.
    set $forwarded_proto $scheme;
    if ($http_x_forwarded_proto) {
        set $forwarded_proto $http_x_forwarded_proto;
    }

    # Using a variable forces nginx to use the resolver on every request
    # instead of the startup-cached IP. This is the standard pattern for
    # dynamic Docker upstreams.
    set $backend http://backend:3000;

    # Vite hashed assets (/assets/*) — immutable long-cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # SPA: serve static files, fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;

        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.open-meteo.com https://api.iconify.design https://api.mymemory.translated.net; frame-ancestors 'none';" always;
    }

    # Reverse-proxy API to backend
    location /api/ {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Reverse-proxy uploaded assets to backend
    location /uploads/ {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Connection "";
    }
}
